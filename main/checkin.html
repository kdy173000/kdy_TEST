<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출퇴근 기록 - 파이어볼</title>
<script>
(function(){
  var raw = sessionStorage.getItem('fb_user');
  if (!raw) { window.location.replace('index.html'); return; }
  try { JSON.parse(raw); }
  catch(e) { window.location.replace('index.html'); }
})();
</script>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<style>
[data-theme="dark"] {
  --bg:#111111; --bg2:#1c1c1c; --bg3:#272727;
  --border:#2e2e2e; --text:#e8e8e8; --text2:#888888; --text3:#4a4a4a;
  --hover:#222222; --shadow:rgba(0,0,0,0.5);
  --card-bg:#1c1c1c; --card-border:#2e2e2e;
}
[data-theme="light"] {
  --bg:#f2f2f2; --bg2:#ffffff; --bg3:#efefed;
  --border:#e0e0e0; --text:#111111; --text2:#666666; --text3:#b0b0b0;
  --hover:#f0f0ee; --shadow:rgba(0,0,0,0.08);
  --card-bg:#ffffff; --card-border:#e0e0e0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}

.topbar{background:#9b1b30;padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:.01em;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.tb-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:6px;padding:5px 12px;font-size:12px;font-family:inherit;cursor:pointer;transition:background .15s;}
.tb-btn:hover{background:rgba(255,255,255,.22);}
.tb-btn.danger{background:rgba(255,255,255,.08);}
.tb-btn.danger:hover{background:rgba(255,80,80,.3);}
.theme-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);border-radius:6px;padding:5px 10px;font-size:12px;font-family:inherit;cursor:pointer;}
.back-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:6px;padding:5px 12px;font-size:12px;font-family:inherit;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;}
.back-btn:hover{background:rgba(255,255,255,.2);}

.container{max-width:820px;margin:0 auto;padding:32px 24px 60px;}
.page-header{margin-bottom:24px;}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);}

/* Clock */
.clock-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:24px;margin-bottom:14px;text-align:center;}
.clock-time{font-size:50px;font-weight:700;letter-spacing:-.02em;line-height:1;margin-bottom:4px;font-variant-numeric:tabular-nums;}
.clock-date{font-size:14px;color:var(--text2);}
.clock-day{display:inline-block;margin-top:6px;font-size:12px;background:var(--bg3);border:1px solid var(--border);padding:2px 10px;border-radius:20px;color:var(--text2);}

/* GPS */
.gps-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:16px 20px;margin-bottom:14px;}
.gps-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.gps-info{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.gps-dot{width:10px;height:10px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.gps-dot.searching{background:#d4a017;animation:pulse 1.2s ease-in-out infinite;}
.gps-dot.ok{background:#52a874;animation:pulse 2s ease-in-out infinite;}
.gps-dot.error{background:#d95f5f;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.gps-label{font-size:13px;font-weight:600;}
.gps-coords{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gps-refresh-btn{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 14px;font-size:12px;font-family:inherit;cursor:pointer;transition:background .15s;}
.gps-refresh-btn:hover{background:var(--hover);color:var(--text);}

/* Zone */
.zone-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:16px 20px;margin-bottom:14px;}
.zone-sec-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;margin-bottom:12px;}
.zone-list{display:flex;flex-direction:column;gap:8px;}
.zone-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;transition:border-color .2s;}
.zone-item.active-zone{border-color:#52a874;background:rgba(82,168,116,.08);}
.zone-item.active-zone .zone-name{color:#52a874;}
.zone-left{display:flex;align-items:center;gap:10px;}
.zone-icon{font-size:16px;}
.zone-name{font-size:13px;font-weight:600;}
.zone-addr{font-size:11px;color:var(--text2);margin-top:1px;}
.zone-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
.zone-badge.in{background:rgba(82,168,116,.15);color:#52a874;border:1px solid rgba(82,168,116,.3);}
.zone-badge.out{background:transparent;color:var(--text3);border:1px solid var(--border);}
.zone-dist{font-size:11px;color:var(--text2);margin-top:3px;text-align:right;}

/* Action Buttons */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.action-btn{border-radius:14px;border:none;padding:20px 16px;font-family:inherit;cursor:pointer;transition:transform .1s,box-shadow .15s,opacity .15s;display:flex;flex-direction:column;align-items:center;gap:5px;min-height:110px;justify-content:center;}
.action-btn:active{transform:scale(.97);}
.action-btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
.btn-icon{font-size:24px;line-height:1;}
.btn-label{font-size:14px;font-weight:700;}
.btn-time{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em;line-height:1.1;}
.btn-place{font-size:11px;font-weight:400;opacity:.85;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.btn-sub{font-size:11px;font-weight:400;opacity:.7;}
.btn-checkin{background:#9b1b30;color:#fff;box-shadow:0 4px 20px rgba(155,27,48,.3);}
.btn-checkin:hover:not(:disabled){box-shadow:0 6px 28px rgba(155,27,48,.45);}
.btn-checkout{background:var(--bg3);border:1px solid var(--border)!important;color:var(--text);}
.btn-checkout:hover:not(:disabled){background:var(--hover);}

/* Work bar */
.workbar{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:16px 20px;margin-bottom:14px;display:none;}
.workbar.visible{display:block;}
.workbar-row{display:grid;grid-template-columns:1fr 1fr 1fr;}
.wb-item{text-align:center;padding:0 6px;}
.wb-item+.wb-item{border-left:1px solid var(--border);}
.wb-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.wb-val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;}
.wb-val.green{color:#52a874;}
.wb-val.red{color:#c0304a;}
.wb-val.orange{color:#d4a017;}
.wb-val.muted{color:var(--text3);}

/* Calendar */
.cal-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;overflow:hidden;margin-bottom:14px;}
.cal-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.cal-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;}
.cal-nav{display:flex;align-items:center;gap:8px;}
.cal-month{font-size:14px;font-weight:700;min-width:80px;text-align:center;}
.cal-nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.cal-nav-btn:hover{background:var(--hover);color:var(--text);}
.cal-grid{padding:14px 16px 18px;}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.cal-wd{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:4px 0;}
.cal-wd:first-child{color:#d95f5f;}
.cal-wd:last-child{color:#5b8bd0;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{border-radius:10px;padding:6px 3px;text-align:center;cursor:default;min-height:64px;border:1px solid transparent;transition:border-color .15s,background .15s;}
.cal-day.has-record{cursor:pointer;}
.cal-day.has-record:hover{border-color:var(--border);background:var(--hover);}
.cal-day.today .cal-d-num{background:#9b1b30;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 2px;}
.cal-day.selected{border-color:#9b1b30!important;background:rgba(155,27,48,.07);}
.cal-d-num{font-size:12px;font-weight:600;line-height:22px;margin-bottom:2px;}
.cal-day.sun .cal-d-num{color:#d95f5f;}
.cal-day.sat .cal-d-num{color:#5b8bd0;}
.cal-day.other-month .cal-d-num{color:var(--text3);}
.cal-dot-row{display:flex;gap:2px;justify-content:center;margin-bottom:2px;}
.cal-dot{width:5px;height:5px;border-radius:50%;}
.cal-dot.in{background:#52a874;}
.cal-dot.out{background:#c0304a;}
.cal-times .t-in{color:#52a874;font-size:10px;font-weight:600;line-height:1.4;}
.cal-times .t-out{color:#c0304a;font-size:10px;font-weight:600;line-height:1.4;}

/* Detail panel */
.detail-panel{background:var(--bg3);border-top:1px solid var(--border);padding:16px 20px;display:none;}
.detail-panel.visible{display:block;}
.detail-date{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.detail-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.detail-item{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.di-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.di-val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;}
.di-val.green{color:#52a874;}
.di-val.red{color:#c0304a;}
.di-place{font-size:11px;color:var(--text2);margin-top:3px;}
.detail-dur{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;}
.dur-label{font-size:11px;color:var(--text2);}
.dur-val{font-size:15px;font-weight:700;}

/* Status tags */
.status-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
.tag-normal{background:rgba(82,168,116,.12);color:#52a874;border:1px solid rgba(82,168,116,.25);}
.tag-late{background:rgba(212,160,23,.12);color:#d4a017;border:1px solid rgba(212,160,23,.25);}
.tag-early{background:rgba(155,27,48,.12);color:#c0304a;border:1px solid rgba(155,27,48,.25);}
.tag-absent{background:rgba(217,95,95,.1);color:#d95f5f;border:1px solid rgba(217,95,95,.2);}

/* Toast */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;font-weight:600;box-shadow:0 8px 30px var(--shadow);opacity:0;transition:opacity .25s,transform .25s;z-index:9999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{border-color:rgba(82,168,116,.4);color:#52a874;}
.toast.error{border-color:rgba(217,95,95,.4);color:#d95f5f;}
.toast.warn{border-color:rgba(212,160,23,.4);color:#d4a017;}

@media(max-width:520px){
  .container{padding:18px 12px 50px;}
  .clock-time{font-size:38px;}
  .action-grid{gap:8px;}
  .wb-val{font-size:15px;}
  .topbar{padding:0 14px;}
  .cal-day{min-height:54px;}
  .cal-times .t-in,.cal-times .t-out{font-size:9px;}
  .detail-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="admin.html">← 뒤로</a>
    <div class="topbar-title">출퇴근 기록</div>
  </div>
  <div class="topbar-right">
    <button class="theme-btn" onclick="toggleTheme()"><span id="t-ico">☀️</span></button>
    <button class="tb-btn danger" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">출퇴근 기록</h1>
    <p class="page-sub" id="userGreet">GPS 위치를 기반으로 출퇴근을 기록합니다.</p>
  </div>

  <!-- 시계 -->
  <div class="clock-card">
    <div class="clock-time" id="clockTime">00:00:00</div>
    <div class="clock-date" id="clockDate"></div>
    <div class="clock-day" id="clockDay"></div>
  </div>

  <!-- GPS -->
  <div class="gps-card">
    <div class="gps-row">
      <div class="gps-info">
        <div class="gps-dot searching" id="gpsDot"></div>
        <div>
          <div class="gps-label" id="gpsLabel">위치 확인 중...</div>
          <div class="gps-coords" id="gpsCoords">GPS 신호를 요청하고 있습니다</div>
        </div>
      </div>
      <button class="gps-refresh-btn" onclick="getLocation()">새로고침</button>
    </div>
  </div>

  <!-- 사업장 -->
  <div class="zone-card">
    <div class="zone-sec-title">등록된 사업장</div>
    <div class="zone-list" id="zoneList">
      <div style="font-size:12px;color:var(--text3);padding:6px 0;">사업장 정보를 불러오는 중...</div>
    </div>
  </div>

  <!-- 출근 / 퇴근 버튼 -->
  <div class="action-grid">
    <button class="action-btn btn-checkin" id="btnCheckin" onclick="doCheckin()" disabled></button>
    <button class="action-btn btn-checkout" id="btnCheckout" onclick="doCheckout()" disabled></button>
  </div>

  <!-- 출근·퇴근·근무시간 바 -->
  <div class="workbar" id="workbar">
    <div class="workbar-row">
      <div class="wb-item">
        <div class="wb-label">출근</div>
        <div class="wb-val green" id="wbCheckin">—</div>
      </div>
      <div class="wb-item">
        <div class="wb-label">퇴근</div>
        <div class="wb-val red" id="wbCheckout">—</div>
      </div>
      <div class="wb-item">
        <div class="wb-label">근무시간</div>
        <div class="wb-val orange" id="wbDuration">—</div>
      </div>
    </div>
  </div>

  <!-- 달력 -->
  <div class="cal-card">
    <div class="cal-header">
      <div class="cal-title">출퇴근 기록</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month" id="calMonth"></div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-wd">일</div><div class="cal-wd">월</div><div class="cal-wd">화</div>
        <div class="cal-wd">수</div><div class="cal-wd">목</div><div class="cal-wd">금</div><div class="cal-wd">토</div>
      </div>
      <div class="cal-days" id="calDays"></div>
    </div>
    <div class="detail-panel" id="detailPanel"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// 관리자 설정 연동
// 관리자 페이지에서 아래 키로 localStorage에 저장하면 자동 반영
//   fb_workplaces  : JSON 배열 [{name,addr,lat,lng,radius}]
//   fb_work_start  : 출근 기준 시간 (예: "09:00")
//   fb_work_end    : 퇴근 기준 시간 (예: "18:00")
// ══════════════════════════════════════════════════════
function loadWorkplaces() {
  try {
    const s = localStorage.getItem('fb_workplaces');
    if (s) return JSON.parse(s);
  } catch(e) {}
  // 기본값 (관리자 미설정 시)
  return [
    { name:'파이어볼 본사', addr:'부산 양산시 물금읍', lat:35.2945, lng:128.9741, radius:300 },
    { name:'파이어볼 2사무소', addr:'부산 해운대구 우동', lat:35.1635, lng:129.1653, radius:200 },
  ];
}
function loadWorkStart() { return localStorage.getItem('fb_work_start') || '09:00'; }
function loadWorkEnd()   { return localStorage.getItem('fb_work_end')   || '18:00'; }

// ── State ─────────────────────────────────────────────
let currentUser = null;
let currentLat = null, currentLng = null;
let gpsOk = false, inZone = false, activeZoneName = '';
let calYear, calMonth, selectedDate = null;
let WORKPLACES = [];

// ── Init ──────────────────────────────────────────────
(function init() {
  const raw = sessionStorage.getItem('fb_user');
  if (!raw) return;
  currentUser = JSON.parse(raw);
  document.getElementById('userGreet').textContent =
    `안녕하세요, ${currentUser.name || currentUser.id}님! GPS 위치를 기반으로 출퇴근을 기록합니다.`;
  WORKPLACES = loadWorkplaces();
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  startClock();
  renderZones([]);
  renderCalendar();
  updateWorkbar();
  renderButtons();
  getLocation();
})();

// ── Clock ─────────────────────────────────────────────
function startClock() {
  function tick() {
    const n = new Date();
    document.getElementById('clockTime').textContent =
      `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
    const days = ['일','월','화','수','목','금','토'];
    document.getElementById('clockDate').textContent =
      `${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일`;
    document.getElementById('clockDay').textContent = `${days[n.getDay()]}요일`;
    updateWorkbarTimer();
  }
  tick(); setInterval(tick, 1000);
}

// ── GPS ───────────────────────────────────────────────
function getLocation() {
  const dot = document.getElementById('gpsDot');
  const lbl = document.getElementById('gpsLabel');
  const crd = document.getElementById('gpsCoords');
  dot.className = 'gps-dot searching';
  lbl.textContent = '위치 확인 중...';
  crd.textContent = 'GPS 신호를 요청하고 있습니다';
  if (!navigator.geolocation) {
    dot.className = 'gps-dot error';
    lbl.textContent = 'GPS 미지원';
    crd.textContent = '이 브라우저는 위치 서비스를 지원하지 않습니다';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      dot.className = 'gps-dot ok';
      lbl.textContent = 'GPS 연결됨';
      crd.textContent = `${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}  (정확도 ±${Math.round(pos.coords.accuracy)}m)`;
      gpsOk = true;
      checkZones();
    },
    err => {
      dot.className = 'gps-dot error';
      const msgs = {1:'위치 권한이 거부되었습니다',2:'위치 신호를 받을 수 없습니다',3:'위치 요청 시간이 초과되었습니다'};
      lbl.textContent = '위치 오류';
      crd.textContent = msgs[err.code] || '알 수 없는 오류';
      gpsOk = false; inZone = false; activeZoneName = '';
      renderZones([]); renderButtons();
    },
    {enableHighAccuracy:true, timeout:10000, maximumAge:0}
  );
}

function haversine(lat1,lng1,lat2,lng2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function checkZones() {
  WORKPLACES = loadWorkplaces();
  if (!gpsOk) { inZone=false; activeZoneName=''; renderZones([]); renderButtons(); return; }
  const dists = WORKPLACES.map(wp => ({
    ...wp,
    dist: Math.round(haversine(currentLat,currentLng,wp.lat,wp.lng)),
    inside: haversine(currentLat,currentLng,wp.lat,wp.lng) <= wp.radius
  }));
  const active = dists.find(d => d.inside);
  inZone = !!active;
  activeZoneName = active ? active.name : '';
  renderZones(dists);
  renderButtons();
}

function renderZones(dists) {
  const list = document.getElementById('zoneList');
  if (!WORKPLACES.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:6px 0;">등록된 사업장이 없습니다. 관리자 페이지에서 설정해주세요.</div>';
    return;
  }
  list.innerHTML = WORKPLACES.map((wp,i) => {
    const d = dists[i];
    const inside = d ? d.inside : false;
    const dist = d ? d.dist : null;
    return `<div class="zone-item${inside?' active-zone':''}">
      <div class="zone-left">
        <div class="zone-icon">${inside?'📍':'🏢'}</div>
        <div>
          <div class="zone-name">${wp.name}</div>
          <div class="zone-addr">${wp.addr} · 반경 ${wp.radius}m</div>
        </div>
      </div>
      <div style="text-align:right">
        <div class="zone-badge ${inside?'in':'out'}">${inside?'범위 내':'범위 외'}</div>
        ${dist!==null?`<div class="zone-dist">${dist>=1000?(dist/1000).toFixed(1)+'km':dist+'m'}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── 출퇴근 ────────────────────────────────────────────
function storageKey() { return `fb_att_${currentUser?.id||'anon'}`; }
function loadRecords() { return JSON.parse(localStorage.getItem(storageKey())||'[]'); }
function saveRecords(r) { localStorage.setItem(storageKey(),JSON.stringify(r)); }
function todayStr() {
  const n=new Date();
  return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;
}
function getTodayRecord() { return loadRecords().find(r=>r.date===todayStr())||null; }

function doCheckin() {
  if (!gpsOk) { showToast('warn','📡 GPS 위치 확인이 필요합니다'); return; }
  if (!inZone) { showToast('error','❌ 사업장 범위 내에서만 출근 가능합니다'); return; }
  const today = getTodayRecord();
  if (today?.checkin) { showToast('warn','⚠️ 이미 출근 처리되었습니다'); return; }
  const now = new Date();
  const timeStr = fmtTime(now);
  const records = loadRecords();
  records.push({
    date: todayStr(),
    checkin: now.toISOString(), checkinTime: timeStr, checkinPlace: activeZoneName,
    checkinLat: currentLat, checkinLng: currentLng,
    checkout: null, checkoutTime: null, checkoutPlace: '',
    status: isLate(now) ? 'late' : 'normal'
  });
  saveRecords(records);
  showToast('success', `✅ 출근 완료 · ${timeStr}${isLate(now)?' (지각)':''}`);
  renderButtons(); updateWorkbar(); renderCalendar();
}

function doCheckout() {
  const today = getTodayRecord();
  if (!today?.checkin) { showToast('warn','⚠️ 출근 기록이 없습니다'); return; }
  if (today?.checkout) { showToast('warn','⚠️ 이미 퇴근 처리되었습니다'); return; }
  const now = new Date();
  const timeStr = fmtTime(now);
  const records = loadRecords();
  const idx = records.findIndex(r=>r.date===todayStr());
  records[idx].checkout = now.toISOString();
  records[idx].checkoutTime = timeStr;
  records[idx].checkoutPlace = activeZoneName || records[idx].checkinPlace;
  if (records[idx].status !== 'late') records[idx].status = isEarlyLeave(now) ? 'early' : 'normal';
  saveRecords(records);
  showToast('success', `🏠 퇴근 완료 · ${timeStr} (근무 ${calcDuration(records[idx].checkin, now.toISOString())})`);
  renderButtons(); updateWorkbar(); renderCalendar();
  if (selectedDate === todayStr()) showDetail(todayStr());
}

function isLate(now) {
  const [h,m] = loadWorkStart().split(':').map(Number);
  return now.getHours()>h||(now.getHours()===h&&now.getMinutes()>m);
}
function isEarlyLeave(now) {
  const [h,m] = loadWorkEnd().split(':').map(Number);
  return now.getHours()<h||(now.getHours()===h&&now.getMinutes()<m);
}

// ── 버튼 렌더 ─────────────────────────────────────────
function renderButtons() {
  const today = getTodayRecord();
  const ci = document.getElementById('btnCheckin');
  const co = document.getElementById('btnCheckout');

  if (today?.checkin && !today?.checkout) {
    ci.disabled = true;  co.disabled = false;
    ci.innerHTML = `<div class="btn-icon">✅</div><div class="btn-label">출근</div><div class="btn-time">${today.checkinTime}</div>${today.checkinPlace?`<div class="btn-place">📍 ${today.checkinPlace}</div>`:''}`;
    co.innerHTML = `<div class="btn-icon">🔴</div><div class="btn-label">퇴근</div><div class="btn-sub">퇴근하기</div>`;
  } else if (today?.checkin && today?.checkout) {
    ci.disabled = true;  co.disabled = true;
    ci.innerHTML = `<div class="btn-icon">✅</div><div class="btn-label">출근</div><div class="btn-time">${today.checkinTime}</div>${today.checkinPlace?`<div class="btn-place">📍 ${today.checkinPlace}</div>`:''}`;
    co.innerHTML = `<div class="btn-icon">✅</div><div class="btn-label">퇴근</div><div class="btn-time">${today.checkoutTime}</div>${today.checkoutPlace?`<div class="btn-place">📍 ${today.checkoutPlace}</div>`:''}`;
  } else {
    ci.disabled = !inZone || !gpsOk;  co.disabled = true;
    ci.innerHTML = `<div class="btn-icon">🟢</div><div class="btn-label">출근</div><div class="btn-sub">${!gpsOk?'위치 확인 필요':inZone?'사업장 범위 내':'사업장 범위 외'}</div>`;
    co.innerHTML = `<div class="btn-icon">🔴</div><div class="btn-label">퇴근</div><div class="btn-sub">출근 기록 필요</div>`;
  }
}

// ── 근무 바 ───────────────────────────────────────────
function updateWorkbar() {
  const today = getTodayRecord();
  const bar = document.getElementById('workbar');
  if (!today?.checkin) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  document.getElementById('wbCheckin').textContent = today.checkinTime || '—';
  document.getElementById('wbCheckout').textContent = today.checkoutTime || '—';
  document.getElementById('wbDuration').textContent =
    today.checkout ? calcDuration(today.checkin, today.checkout) : calcDuration(today.checkin, new Date().toISOString());
}
function updateWorkbarTimer() {
  const today = getTodayRecord();
  if (today?.checkin && !today?.checkout)
    document.getElementById('wbDuration').textContent = calcDuration(today.checkin, new Date().toISOString());
}

// ── 달력 ─────────────────────────────────────────────
function changeMonth(dir) {
  calMonth += dir;
  if (calMonth<0){calMonth=11;calYear--;}
  if (calMonth>11){calMonth=0;calYear++;}
  selectedDate = null;
  document.getElementById('detailPanel').classList.remove('visible');
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calMonth').textContent = `${calYear}년 ${calMonth+1}월`;
  const records = loadRecords();
  const recMap = {};
  records.forEach(r => { recMap[r.date] = r; });

  const today = new Date();
  const todayIso = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  const totalCells = Math.ceil((firstDay+daysInMonth)/7)*7;
  let html = '';

  for (let i=0; i<totalCells; i++) {
    let dayNum, dateStr, isOther=false;
    const dow = i%7;
    if (i < firstDay) {
      dayNum = daysInPrev - firstDay + i + 1;
      const pm = calMonth===0?12:calMonth, py = calMonth===0?calYear-1:calYear;
      dateStr = `${py}-${pad(pm)}-${pad(dayNum)}`; isOther=true;
    } else if (i >= firstDay+daysInMonth) {
      dayNum = i - firstDay - daysInMonth + 1;
      const nm = calMonth===11?1:calMonth+2, ny = calMonth===11?calYear+1:calYear;
      dateStr = `${ny}-${pad(nm)}-${pad(dayNum)}`; isOther=true;
    } else {
      dayNum = i - firstDay + 1;
      dateStr = `${calYear}-${pad(calMonth+1)}-${pad(dayNum)}`;
    }

    const rec = recMap[dateStr];
    const isToday = dateStr===todayIso;
    const isSel = dateStr===selectedDate;
    const dowCls = dow===0?'sun':dow===6?'sat':'';
    const cls = [
      'cal-day',
      isOther?'other-month':'',
      isToday?'today':'',
      isSel?'selected':'',
      dowCls,
      rec?'has-record':''
    ].filter(Boolean).join(' ');

    let dotHtml='', timesHtml='';
    if (rec) {
      dotHtml = `<div class="cal-dot-row">${rec.checkin?'<div class="cal-dot in"></div>':''}${rec.checkout?'<div class="cal-dot out"></div>':''}</div>`;
      timesHtml = `<div class="cal-times">${rec.checkinTime?`<div class="t-in">${rec.checkinTime}</div>`:''}${rec.checkoutTime?`<div class="t-out">${rec.checkoutTime}</div>`:''}</div>`;
    }

    html += `<div class="${cls}"${rec?` onclick="selectDate('${dateStr}')"`:''}>
      <div class="cal-d-num">${dayNum}</div>
      ${dotHtml}${timesHtml}
    </div>`;
  }
  document.getElementById('calDays').innerHTML = html;
}

function selectDate(dateStr) {
  if (selectedDate===dateStr) {
    selectedDate=null;
    document.getElementById('detailPanel').classList.remove('visible');
    renderCalendar(); return;
  }
  selectedDate = dateStr;
  renderCalendar();
  showDetail(dateStr);
}

function showDetail(dateStr) {
  const rec = loadRecords().find(r=>r.date===dateStr);
  const panel = document.getElementById('detailPanel');
  if (!rec) { panel.classList.remove('visible'); return; }

  const [yyyy,mm,dd] = dateStr.split('-');
  const dow = ['일','월','화','수','목','금','토'][new Date(dateStr).getDay()];
  const statusLabel = {normal:'정상',late:'지각',early:'조기퇴근',absent:'결근'};
  const statusClass = {normal:'tag-normal',late:'tag-late',early:'tag-early',absent:'tag-absent'};
  const dur = rec.checkin&&rec.checkout ? calcDuration(rec.checkin,rec.checkout) : rec.checkin ? '근무 중' : '—';

  panel.innerHTML = `
    <div class="detail-date">
      ${yyyy}년 ${mm}월 ${dd}일 (${dow})
      <span class="status-tag ${statusClass[rec.status]||'tag-normal'}">${statusLabel[rec.status]||'—'}</span>
    </div>
    <div class="detail-row">
      <div class="detail-item">
        <div class="di-label">출근 시간</div>
        <div class="di-val green">${rec.checkinTime||'—'}</div>
        ${rec.checkinPlace?`<div class="di-place">📍 ${rec.checkinPlace}</div>`:''}
      </div>
      <div class="detail-item">
        <div class="di-label">퇴근 시간</div>
        <div class="di-val red">${rec.checkoutTime||'—'}</div>
        ${rec.checkoutPlace?`<div class="di-place">📍 ${rec.checkoutPlace}</div>`:''}
      </div>
    </div>
    <div class="detail-dur">
      <div class="dur-label">총 근무시간</div>
      <div class="dur-val">${dur}</div>
    </div>`;
  panel.classList.add('visible');
}

// ── Utilities ─────────────────────────────────────────
function pad(n) { return String(n).padStart(2,'0'); }
function fmtTime(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function calcDuration(s,e) {
  const ms=new Date(e)-new Date(s);
  if(ms<0) return '—';
  return `${Math.floor(ms/3600000)}시간 ${pad(Math.floor((ms%3600000)/60000))}분`;
}
function showToast(type, msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove('show'),3200);
}
function toggleTheme() {
  const h=document.documentElement, dark=h.dataset.theme==='dark';
  h.dataset.theme=dark?'light':'dark';
  document.getElementById('t-ico').textContent=dark?'🌙':'☀️';
}
function doLogout() {
  if(!confirm('로그아웃 하시겠습니까?')) return;
  sessionStorage.removeItem('fb_user');
  window.location.href='index.html';
}
</script>
