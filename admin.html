<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파이어볼 관리자</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<style>
[data-theme="dark"] {
  --bg: #111111; --bg2: #1c1c1c; --bg3: #272727;
  --border: #2e2e2e; --text: #e8e8e8; --text2: #888888; --text3: #4a4a4a;
  --hover: #222222; --shadow: rgba(0,0,0,0.5);
  --card-bg: #1c1c1c; --card-border: #2e2e2e;
}
[data-theme="light"] {
  --bg: #f2f2f2; --bg2: #ffffff; --bg3: #efefed;
  --border: #e0e0e0; --text: #111111; --text2: #666666; --text3: #b0b0b0;
  --hover: #f0f0ee; --shadow: rgba(0,0,0,0.08);
  --card-bg: #ffffff; --card-border: #e0e0e0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; transition: background .2s, color .2s;
}
.topbar {
  background: #9b1b30;
  padding: 0 28px;
  height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-title { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: .01em; }
.topbar-badge {
  font-size: 10.5px; background: rgba(255,255,255,.2);
  color: rgba(255,255,255,.9); padding: 2px 8px;
  border-radius: 20px; font-weight: 600;
}
.topbar-right { display: flex; align-items: center; gap: 8px; }
.tb-btn {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  color: #fff; border-radius: 6px; padding: 5px 12px;
  font-size: 12px; font-family: inherit; cursor: pointer;
  transition: background .15s;
}
.tb-btn:hover { background: rgba(255,255,255,.22); }
.tb-btn.danger { background: rgba(255,255,255,.08); }
.tb-btn.danger:hover { background: rgba(255,80,80,.3); }
.container { max-width: 900px; margin: 0 auto; padding: 40px 24px 60px; }
.page-title { font-size: 24px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 6px; }
.page-sub { font-size: 13px; color: var(--text2); margin-bottom: 32px; }
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}
.card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 12px; padding: 22px 20px;
  cursor: pointer; transition: box-shadow .15s, transform .1s, border-color .15s;
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; gap: 8px;
}
.card:hover {
  box-shadow: 0 6px 24px var(--shadow);
  transform: translateY(-2px);
  border-color: #9b1b30;
}
.card-icon { font-size: 28px; line-height: 1; }
.card-title { font-size: 14px; font-weight: 700; margin-top: 2px; }
.card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
.section-label {
  font-size: 11.5px; font-weight: 700; color: var(--text3);
  letter-spacing: .05em; margin-bottom: 12px; margin-top: 32px;
}
.theme-btn {
  background: none; border: 1px solid rgba(255,255,255,.2);
  color: rgba(255,255,255,.8); border-radius: 6px; padding: 5px 10px;
  font-size: 12px; font-family: inherit; cursor: pointer;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">파이어볼 관리자</span>
    <span class="topbar-badge">ADMIN</span>
  </div>
  <div class="topbar-right">
    <button class="theme-btn" onclick="toggleTheme()"><span id="t-ico">☀️</span></button>
    <button class="tb-btn danger" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<div class="container">
  <div class="page-title">관리자 대시보드</div>
  <div class="page-sub" id="adminGreet">파이어볼 사내 포털 관리 메뉴입니다.</div>

  <div class="section-label">직원 관리</div>
  <div class="grid">
    <a class="card" href="admin/Staff.html">
      <div class="card-icon">👥</div>
      <div class="card-title">계정 관리</div>
      <div class="card-desc">직원 계정 생성 · 수정 · 권한 설정</div>
    </a>
    <a class="card" href="admin/PermLinks.html">
      <div class="card-icon">🔗</div>
      <div class="card-title">권한 링크 설정</div>
      <div class="card-desc">권한별 접근 가능 페이지 URL 설정</div>
    </a>
  </div>

  <div class="section-label">포털 설정</div>
  <div class="grid">
    <div class="card" onclick="alert('준비 중입니다.')">
      <div class="card-icon">📢</div>
      <div class="card-title">공지사항 관리</div>
      <div class="card-desc">공지 등록 · 수정 · 삭제</div>
    </div>
    <div class="card" onclick="alert('준비 중입니다.')">
      <div class="card-icon">📅</div>
      <div class="card-title">일정 관리</div>
      <div class="card-desc">연차 · 출장 일정 등록 및 수정</div>
    </div>
    <div class="card" onclick="alert('준비 중입니다.')">
      <div class="card-icon">⚙️</div>
      <div class="card-title">시스템 설정</div>
      <div class="card-desc">세계 시계 타임존 등 환경 설정</div>
    </div>
  </div>
</div>

<script>
const user = JSON.parse(sessionStorage.getItem('fb_user') || 'null');
if (!user || user.role !== 'admin') { window.location.href = 'index.html'; }
else { document.getElementById('adminGreet').textContent = user.id + ' 님, 환영합니다.'; }
function toggleTheme() {
  const h = document.documentElement, dark = h.dataset.theme === 'dark';
  h.dataset.theme = dark ? 'light' : 'dark';
  document.getElementById('t-ico').textContent = dark ? '🌙' : '☀️';
}
function doLogout() { sessionStorage.removeItem('fb_user'); window.location.href = 'index.html'; }
</script>
</body>
</html>
