<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직원 관리</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<style>
[data-theme="dark"] {
  --bg:#111111; --bg2:#1c1c1c; --bg3:#272727;
  --border:#2e2e2e; --border2:#3a3a3a;
  --text:#e8e8e8; --text2:#888888; --text3:#4a4a4a;
  --hover:#222222; --shadow:rgba(0,0,0,.5);
  --input-bg:#242424; --input-border:#333;
  --drag-over:rgba(155,27,48,.1);
}
[data-theme="light"] {
  --bg:#f2f2f2; --bg2:#ffffff; --bg3:#efefed;
  --border:#e0e0e0; --border2:#d0d0d0;
  --text:#111111; --text2:#666666; --text3:#b0b0b0;
  --hover:#f0f0ee; --shadow:rgba(0,0,0,.08);
  --input-bg:#f7f7f7; --input-border:#d8d8d8;
  --drag-over:rgba(155,27,48,.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Pretendard',-apple-system,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; transition:background .2s,color .2s;
}
.topbar {
  background:#9b1b30; padding:0 28px; height:52px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.topbar-title { font-size:15px; font-weight:700; color:#fff; }
.topbar-right { display:flex; gap:8px; align-items:center; }
.tb-btn {
  background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
  color:#fff; border-radius:6px; padding:5px 12px;
  font-size:12px; font-family:inherit; cursor:pointer; transition:background .15s;
}
.tb-btn:hover { background:rgba(255,255,255,.22); }
.theme-btn {
  background:none; border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.8); border-radius:6px; padding:5px 10px;
  font-size:12px; font-family:inherit; cursor:pointer;
}
.container { max-width:1100px; margin:0 auto; padding:36px 24px 80px; }
.page-title { font-size:22px; font-weight:700; letter-spacing:-.02em; margin-bottom:4px; }
.page-sub { font-size:13px; color:var(--text2); margin-bottom:28px; }
.section-wrap { margin-bottom:8px; }
.section-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.section-badge {
  display:inline-flex; align-items:center;
  padding:3px 14px; border-radius:20px;
  font-size:12px; font-weight:700; letter-spacing:.04em;
}
.section-badge.office { background:rgba(74,138,244,.15); color:#4a8af4; border:1px solid rgba(74,138,244,.3); }
.section-badge.field  { background:rgba(82,168,116,.15); color:#52a874; border:1px solid rgba(82,168,116,.3); }
.section-count { font-size:12px; color:var(--text3); }
.section-divider { border:none; border-top:2px solid var(--border2); margin:28px 0 24px; }
.teams-grid { display:flex; flex-wrap:wrap; gap:14px; }
.team-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:12px; overflow:hidden;
  width:calc(33.333% - 10px); min-width:220px; flex-shrink:0;
  transition:box-shadow .15s, border-color .15s;
}
.team-card.drag-over-team { border-color:#9b1b30; box-shadow:0 0 0 2px rgba(155,27,48,.25); }
.team-card.dragging-team { opacity:0.35; }
.team-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px;
  background:var(--bg3); border-bottom:1px solid var(--border);
  cursor:grab; user-select:none;
}
.team-header:active { cursor:grabbing; }
.team-header-left { display:flex; align-items:center; gap:6px; }
.team-drag-icon { font-size:14px; opacity:.4; }
.team-name { font-size:13px; font-weight:700; }
.team-count { font-size:11px; color:var(--text3); }
.team-add-btn {
  background:none; border:none; color:var(--text3);
  font-size:18px; cursor:pointer; padding:0 2px;
  transition:color .15s; line-height:1;
}
.team-add-btn:hover { color:#9b1b30; }
.emp-list {
  padding:8px; min-height:56px;
  display:flex; flex-direction:column; gap:5px;
}
.emp-list.drag-over { background:var(--drag-over); }
.emp-empty {
  padding:14px 8px; text-align:center;
  font-size:12px; color:var(--text3);
  border:1.5px dashed var(--border); border-radius:8px;
}
.emp-card {
  display:flex; align-items:center;
  padding:8px 10px; border-radius:8px;
  background:var(--bg3); border:1px solid var(--border);
  cursor:grab; user-select:none;
  transition:background .1s, box-shadow .1s;
}
.emp-card:active { cursor:grabbing; }
.emp-card:hover { background:var(--hover); }
.emp-card.dragging { opacity:0.35; }
.emp-drag { font-size:12px; opacity:.35; margin-right:7px; flex-shrink:0; }
.emp-info { flex:1; min-width:0; }
.emp-name-line { font-size:13px; font-weight:600; color:var(--text); }
.emp-phone { font-size:11.5px; color:var(--text3); margin-top:2px; }
.emp-actions { display:flex; gap:3px; flex-shrink:0; margin-left:6px; }
.emp-act-btn {
  background:none; border:none; color:var(--text3);
  font-size:12px; cursor:pointer; padding:2px 5px; border-radius:4px;
  transition:background .1s, color .1s;
}
.emp-act-btn:hover { background:var(--hover); color:var(--text); }
.emp-act-btn.del:hover { color:#d95f5f; }
.modal-overlay {
  position:fixed; inset:0; z-index:2000;
  background:rgba(0,0,0,.55); backdrop-filter:blur(3px);
  display:flex; align-items:center; justify-content:center;
}
.modal {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:12px; padding:26px 24px;
  width:400px; max-width:95vw; max-height:90vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.modal-title { font-size:15px; font-weight:700; margin-bottom:18px; }
.modal-fields { display:flex; flex-direction:column; gap:12px; }
.field { display:flex; flex-direction:column; gap:5px; }
.field label { font-size:11px; font-weight:600; color:var(--text3); letter-spacing:.05em; }
.field input, .field select {
  padding:9px 12px; border-radius:7px;
  border:1px solid var(--input-border);
  background:var(--input-bg); color:var(--text);
  font-size:13.5px; font-family:inherit; outline:none;
  transition:border-color .15s;
}
.field input:focus, .field select:focus { border-color:#9b1b30; }
.modal-actions { display:flex; gap:8px; margin-top:18px; }
.modal-btn {
  flex:1; padding:9px; border-radius:7px; border:none;
  background:#9b1b30; color:#fff;
  font-size:13px; font-weight:700; font-family:inherit; cursor:pointer;
  transition:background .15s;
}
.modal-btn:hover { background:#7e1627; }
.modal-btn.sec {
  background:var(--bg3); color:var(--text2);
  border:1px solid var(--border);
}
.modal-btn.sec:hover { background:var(--hover); color:var(--text); }
@media (max-width:700px) {
  .team-card { width:100%; min-width:0; }
  .teams-grid { flex-direction:column; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">직원 관리</span>
  <div class="topbar-right">
    <button class="tb-btn" onclick="window.location.href='../admin.html'">← 관리자 홈</button>
    <button class="theme-btn" onclick="toggleTheme()"><span id="t-ico">☀️</span></button>
    <button class="tb-btn" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<div class="container">
  <div class="page-title">직원 관리</div>
  <div class="page-sub">팀별 직원 현황을 관리합니다. 직원 카드와 팀을 드래그하여 이동할 수 있습니다.</div>
  <div id="orgRoot"></div>
</div>

<div class="modal-overlay" id="empModal" style="display:none" onclick="if(event.target===this)closeEmpModal()">
  <div class="modal">
    <div class="modal-title" id="empModalTitle">직원 추가</div>
    <div class="modal-fields">
      <div class="field"><label>이름</label><input id="empName" placeholder="예: 김다영"></div>
      <div class="field"><label>직책</label><input id="empRank" placeholder="예: 대리"></div>
      <div class="field"><label>핸드폰 번호</label><input id="empPhone" type="tel" placeholder="예: 010-1234-5678"></div>
      <div class="field"><label>소속 팀</label><select id="empTeamSel"></select></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="saveEmp()">저장</button>
      <button class="modal-btn sec" onclick="closeEmpModal()">취소</button>
    </div>
  </div>
</div>

<script>
const me = JSON.parse(sessionStorage.getItem('fb_user') || 'null');
if (!me || me.role !== 'admin') { window.location.href = '../index.html'; }

function toggleTheme() {
  const h = document.documentElement, dark = h.dataset.theme === 'dark';
  h.dataset.theme = dark ? 'light' : 'dark';
  document.getElementById('t-ico').textContent = dark ? '🌙' : '☀️';
}
function doLogout() { sessionStorage.removeItem('fb_user'); window.location.href = '../index.html'; }

const KEY = 'fb_emp_data';
const DEFAULT_DATA = {
  sections: [
    {
      id: 'office', name: '사무실',
      teams: [
        { id: 't_mgmt',   name: '관리팀',    employees: [] },
        { id: 't_intl',   name: '해외소통팀', employees: [] },
        { id: 't_design', name: '디자인팀',   employees: [] },
        { id: 't_pr',     name: '국내홍보팀', employees: [] },
        { id: 't_rd',     name: '연구팀',     employees: [] },
      ]
    },
    {
      id: 'field', name: '현장',
      teams: [
        { id: 't_mfg', name: '제조팀', employees: [] },
        { id: 't_sub', name: '소분팀', employees: [] },
        { id: 't_pkg', name: '포장팀', employees: [] },
      ]
    }
  ]
};

function getData() {
  const s = localStorage.getItem(KEY);
  return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveData(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
function uid() { return 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

function findTeam(data, teamId) {
  for (const sec of data.sections)
    for (const t of sec.teams)
      if (t.id === teamId) return t;
  return null;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const data = getData();
  const root = document.getElementById('orgRoot');
  let html = '';
  data.sections.forEach((sec, si) => {
    if (si > 0) html += '<hr class="section-divider">';
    const empCount = sec.teams.reduce((n, t) => n + t.employees.length, 0);
    html += `
    <div class="section-wrap">
      <div class="section-header">
        <span class="section-badge ${sec.id}">${esc(sec.name)}</span>
        <span class="section-count">팀 ${sec.teams.length}개 · 직원 ${empCount}명</span>
      </div>
      <div class="teams-grid" id="grid_${sec.id}" data-section-id="${sec.id}">
        ${sec.teams.map(t => renderTeam(t, sec.id)).join('')}
      </div>
    </div>`;
  });
  root.innerHTML = html;
  attachDragEvents();
}

function renderTeam(team, secId) {
  const empRows = team.employees.length > 0
    ? team.employees.map(e => renderEmp(e, team.id)).join('')
    : '<div class="emp-empty">직원이 없습니다. ＋ 버튼으로 추가하거나 드롭하세요</div>';
  return `
  <div class="team-card" id="team_${team.id}" data-team-id="${team.id}" data-section-id="${secId}" draggable="true">
    <div class="team-header">
      <div class="team-header-left">
        <span class="team-drag-icon">⠿</span>
        <span class="team-name">${esc(team.name)}</span>
        <span class="team-count">(${team.employees.length}명)</span>
      </div>
      <button class="team-add-btn" onclick="openAddEmp('${team.id}')" title="직원 추가">＋</button>
    </div>
    <div class="emp-list" id="emplist_${team.id}" data-team-id="${team.id}">
      ${empRows}
    </div>
  </div>`;
}

function renderEmp(emp, teamId) {
  const rank = emp.rank ? ` [${esc(emp.rank)}]` : '';
  const phone = emp.phone ? `<div class="emp-phone">📱 ${esc(emp.phone)}</div>` : '';
  return `
  <div class="emp-card" id="emp_${emp.id}" data-emp-id="${emp.id}" data-team-id="${teamId}" draggable="true">
    <span class="emp-drag">⠿</span>
    <div class="emp-info">
      <div class="emp-name-line">${esc(emp.name)}${rank}</div>
      ${phone}
    </div>
    <div class="emp-actions">
      <button class="emp-act-btn" onclick="openEditEmp('${emp.id}','${teamId}')">✏️</button>
      <button class="emp-act-btn del" onclick="deleteEmp('${emp.id}','${teamId}')">✕</button>
    </div>
  </div>`;
}

let dragEmpId=null, dragEmpFromTeam=null;
let dragTeamId=null, dragTeamFromSection=null;
let dragType=null;

function attachDragEvents() {
  document.querySelectorAll('.emp-card').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragType='emp'; dragEmpId=el.dataset.empId; dragEmpFromTeam=el.dataset.teamId;
      setTimeout(()=>el.classList.add('dragging'),0);
      e.dataTransfer.effectAllowed='move'; e.stopPropagation();
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.emp-list').forEach(l=>l.classList.remove('drag-over'));
      dragType=null;
    });
  });

  document.querySelectorAll('.emp-list').forEach(zone => {
    zone.addEventListener('dragover', e => {
      if (dragType!=='emp') return;
      e.preventDefault(); e.stopPropagation();
      e.dataTransfer.dropEffect='move';
      zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', e => {
      if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
    });
    zone.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      zone.classList.remove('drag-over');
      if (dragType!=='emp'||!dragEmpId) return;
      const toTeam=zone.dataset.teamId;
      if (toTeam===dragEmpFromTeam) return;
      const data=getData();
      const fromT=findTeam(data,dragEmpFromTeam);
      const toT=findTeam(data,toTeam);
      if(!fromT||!toT) return;
      const idx=fromT.employees.findIndex(e=>e.id===dragEmpId);
      if(idx<0) return;
      const [emp]=fromT.employees.splice(idx,1);
      toT.employees.push(emp);
      saveData(data); render();
    });
  });

  document.querySelectorAll('.team-card').forEach(el => {
    el.addEventListener('dragstart', e => {
      if (dragType==='emp') return;
      dragType='team'; dragTeamId=el.dataset.teamId; dragTeamFromSection=el.dataset.sectionId;
      setTimeout(()=>el.classList.add('dragging-team'),0);
      e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging-team');
      document.querySelectorAll('.team-card').forEach(t=>t.classList.remove('drag-over-team'));
      dragType=null;
    });
    el.addEventListener('dragover', e => {
      if (dragType!=='team'||el.dataset.teamId===dragTeamId) return;
      e.preventDefault(); e.stopPropagation();
      document.querySelectorAll('.team-card').forEach(t=>t.classList.remove('drag-over-team'));
      el.classList.add('drag-over-team');
    });
    el.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      document.querySelectorAll('.team-card').forEach(t=>t.classList.remove('drag-over-team'));
      if (dragType!=='team'||!dragTeamId||el.dataset.teamId===dragTeamId) return;
      const toTeamId=el.dataset.teamId, toSecId=el.dataset.sectionId;
      const data=getData();
      const fromSec=data.sections.find(s=>s.id===dragTeamFromSection);
      const toSec=data.sections.find(s=>s.id===toSecId);
      if(!fromSec||!toSec) return;
      const fromIdx=fromSec.teams.findIndex(t=>t.id===dragTeamId);
      if(fromIdx<0) return;
      const [movedTeam]=fromSec.teams.splice(fromIdx,1);
      const toIdx=toSec.teams.findIndex(t=>t.id===toTeamId);
      toSec.teams.splice(toIdx,0,movedTeam);
      saveData(data); render();
    });
  });
}

let _editEmpId=null, _editEmpTeam=null;

function buildTeamOptions(selectedTeamId) {
  const data=getData();
  const sel=document.getElementById('empTeamSel');
  sel.innerHTML='';
  data.sections.forEach(sec=>{
    const og=document.createElement('optgroup'); og.label=sec.name;
    sec.teams.forEach(t=>{
      const opt=document.createElement('option');
      opt.value=t.id; opt.textContent=t.name;
      if(t.id===selectedTeamId) opt.selected=true;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });
}

function openAddEmp(teamId) {
  _editEmpId=null; _editEmpTeam=null;
  document.getElementById('empModalTitle').textContent='직원 추가';
  document.getElementById('empName').value='';
  document.getElementById('empRank').value='';
  document.getElementById('empPhone').value='';
  buildTeamOptions(teamId);
  document.getElementById('empModal').style.display='flex';
  setTimeout(()=>document.getElementById('empName').focus(),100);
}

function openEditEmp(empId, teamId) {
  _editEmpId=empId; _editEmpTeam=teamId;
  const data=getData();
  const team=findTeam(data,teamId);
  const emp=team?.employees.find(e=>e.id===empId);
  if(!emp) return;
  document.getElementById('empModalTitle').textContent='직원 수정';
  document.getElementById('empName').value=emp.name||'';
  document.getElementById('empRank').value=emp.rank||'';
  document.getElementById('empPhone').value=emp.phone||'';
  buildTeamOptions(teamId);
  document.getElementById('empModal').style.display='flex';
}

function closeEmpModal() { document.getElementById('empModal').style.display='none'; }

function saveEmp() {
  const name=document.getElementById('empName').value.trim();
  const rank=document.getElementById('empRank').value.trim();
  const phone=document.getElementById('empPhone').value.trim();
  const teamId=document.getElementById('empTeamSel').value;
  if(!name){alert('이름을 입력해주세요.');return;}
  const data=getData();
  if(_editEmpId){
    const oldTeam=findTeam(data,_editEmpTeam);
    const idx=oldTeam?.employees.findIndex(e=>e.id===_editEmpId);
    if(idx==null||idx<0) return;
    const emp=oldTeam.employees[idx];
    emp.name=name; emp.rank=rank; emp.phone=phone;
    if(teamId!==_editEmpTeam){
      oldTeam.employees.splice(idx,1);
      const newTeam=findTeam(data,teamId);
      if(newTeam) newTeam.employees.push(emp);
    }
  } else {
    const team=findTeam(data,teamId);
    if(!team) return;
    team.employees.push({id:uid(),name,rank,phone});
  }
  saveData(data); closeEmpModal(); render();
}

function deleteEmp(empId, teamId) {
  if(!confirm('해당 직원을 삭제하시겠습니까?')) return;
  const data=getData();
  const team=findTeam(data,teamId);
  if(!team) return;
  const idx=team.employees.findIndex(e=>e.id===empId);
  if(idx>=0) team.employees.splice(idx,1);
  saveData(data); render();
}

render();
</script>
</body>
</html>
